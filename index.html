<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REETLE - TEST MODUS</title>
    <style>
        :root {
            --primary: #d4a373;
            --background: #f0f0f0; /* Lichte achtergrond zoals poople.io */
            --tile-border: #d3d6da;
            --tile-bg: #ffffff;
            --text-color: #1a1a1a;
            /* De gevraagde roze huidskleur voor juiste letters */
            --correct-pink: #f8cccc; 
            --keyboard-bg: #d3d6da;
            --key-bg: #ffffff;
            --key-text: #1a1a1a;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            /* Voorkom scrollen op body bij typen mobiel */
            overflow-x: hidden;
        }

        h1 {
            color: #1a1a1a;
            margin: 5px 0 2px 0;
            font-size: 2rem;
            letter-spacing: 1px;
            text-align: center;
        }
        
        #test-indicator {
            background-color: #dc2626;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .target-box {
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* HET SPEELVELD (HET LADDER ROOSTER) */
        #ladder-container {
            flex-grow: 1; /* Neemt beschikbare ruimte in */
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 20px;
            /* Fade effect aan de bovenkant zoals in het voorbeeld */
            mask-image: linear-gradient(to top, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to top, black 85%, transparent 100%);
            overflow-y: auto; /* Zorg dat de ladder kan scrollen als hij lang is */
            padding-top: 10px;
        }

        #ladder {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            margin-bottom: 15px;
        }

        .word-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            width: 100%;
            max-width: 260px; /* Mooie compacte breedte voor 4 letters */
            margin: 0 auto;
            animation: fadeIn 0.3s ease-in-out;
        }

        /* DE LETTER VAKJES */
        .tile {
            aspect-ratio: 1; /* Altijd een vierkant */
            background-color: var(--tile-bg);
            border: 2px solid var(--tile-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 2px;
            transition: background-color 0.2s, border-color 0.2s;
        }

        /* Kleuren voor de start en het doel */
        .word-row.start .tile { border-color: #00b4d8; color: #00b4d8; }
        .word-row.end .tile { border-color: var(--success); color: var(--success); background-color: #e6f7ef; }
        
        /* De roze huidskleur voor juiste letters ten opzichte van REET */
        .tile.correct-pos {
            background-color: var(--correct-pink);
            border-color: var(--correct-pink);
            color: #1a1a1a !important; /* Forceer zwarte tekst op roze */
        }

        /* Input Area (voor de testknop en berichten) */
        #message-area {
            width: 100%;
            max-width: 350px;
            text-align: center;
            margin-bottom: 10px;
        }

        #message {
            color: #ff6b6b;
            font-weight: bold;
            min-height: 24px;
            margin-bottom: 5px;
        }

        .btn-test {
            background-color: #dc2626;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
        }

        /* HET VIRTUELE TOETSENBORD */
        #keyboard {
            width: 100%;
            max-width: 500px;
            background-color: var(--keyboard-bg);
            padding: 8px 3px;
            border-radius: 8px;
            box-sizing: border-box;
            user-select: none; /* Voorkom tekstselectie bij klikken */
            margin-top: auto; /* Duw toetsenbord naar onderen */
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 6px;
        }
        .keyboard-row:last-child { margin-bottom: 0; }

        .key {
            background-color: var(--key-bg);
            color: var(--key-text);
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            height: 45px;
            flex-grow: 1;
            flex-basis: 0; /* Gelijkmatige verdeling */
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.1s;
            -webkit-tap-highlight-color: transparent; /* Voorkom blauwe gloed mobiel */
        }
        .key:active { background-color: #e0e0e0; }

        /* Grotere toetsen voor Enter en Backspace */
        .key.large { flex-grow: 1.5; font-size: 0.8rem; }
        .key.backspace { flex-grow: 1.2; font-size: 1.3rem; }

        /* LOADING INDICATOR */
        #loading { font-size: 1.2rem; margin-top: 50px; }
        .hidden { display: none !important; }
        
        /* MODAL STYLES (STATISTIEKEN POPUP) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: #ffffff;
            color: #121213;
            padding: 25px;
            border-radius: 14px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 4px 23px rgba(0,0,0,0.5);
            position: relative;
        }
        .modal h2 { margin-top: 5px; font-size: 1.5rem; }
        .modal h3 { font-size: 1.8rem; margin: 10px 0; letter-spacing: 1px; }
        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 1.5rem; cursor: pointer; color: #777;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .stat-box { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 1.6rem; font-weight: bold; }
        .stat-lbl { font-size: 0.7rem; color: #666; text-transform: uppercase; margin-top: 2px; line-height: 1.1; }
        
        /* Distributie Grafiek */
        .dist-title { font-weight: bold; text-align: left; margin: 15px 0 5px 0; font-size: 0.9rem; }
        .dist-row { display: flex; align-items: center; margin-bottom: 4px; font-size: 0.85rem; }
        .dist-lbl { width: 25px; text-align: right; padding-right: 8px; font-weight: bold; }
        .dist-bar-container { flex-grow: 1; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
        .dist-bar { background: #787c7e; color: white; text-align: right; padding-right: 5px; font-weight: bold; font-size: 0.8rem; width: 0%; min-width: 20px; box-sizing: border-box; border-radius: 3px; }
        .dist-bar.current-win { background: #3b82f6; } /* Blauw voor de huidige winst */

        .countdown { margin-top: 15px; font-size: 0.9rem; color: #555; font-weight: bold; }
        .copy-btn { color: #3b82f6; text-decoration: underline; cursor: pointer; margin: 10px 0; display: inline-block; font-size: 0.9rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
